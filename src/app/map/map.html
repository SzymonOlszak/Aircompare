<section class="header-section">
  <div class="header-container">
    <h1>AirCompare</h1>
  </div>
</section>
<section class="map-section">
  <div class="api-visibility-container">
    <div class="api-visibility">
      <div class="api-checkbox-container">
        <input type="checkbox" id="airly" class="api-checkbox" checked (change)="toggleSource('airly', $event); toggleSource('airly (saved)', $event)" />
        <label for="airly" class="circle airly">Airly</label>
      </div>
      <div class="api-checkbox-container">
        <input type="checkbox" id="openaq" class="api-checkbox" checked (change)="toggleSource('openaq', $event)"/>
        <label for="openaq" class="circle openaq">OpenAQ</label>
      </div>
      <div class="api-checkbox-container">
        <input type="checkbox" id="warszawa" class="api-checkbox" checked (change)="toggleSource('warsawIoT', $event)"/>
        <label for="warszawa" class="circle warszawa">UM Warszawa</label>
      </div>
      <div class="api-checkbox-container">
        <input type="checkbox" id="aqicn" class="api-checkbox" checked (change)="toggleSource('aqicn', $event)"/>
        <label for="aqicn" class="circle aqicn">AQICN</label>
      </div>
      <div class="api-checkbox-container">
        <input type="checkbox" id="gios" class="api-checkbox" checked (change)="toggleSource('gios', $event)"/>
        <label for="gios" class="circle gios">GIOS</label>
      </div>
    </div>
  </div>

  <div class="map-legend-container">
    <div class="map-legend">
      <h2>CAQI Standards</h2>
      <div class="legend-element">
        <p>0</p>
        <p>25</p>
        <p>50</p>
        <p>75</p>
        <p>100</p>
      </div>
      <div class="wind-container">
        <h2>Wind speed</h2>
        @if (windData) {
          <p class="wind">{{windData.speed * 3.6 | number:'1.0-1'}} km/h</p>
        }
      </div>
    </div>
  </div>

  <div id="map"></div>
  <div class="buttons-container">
    <div class="buttons">
      <button class='measurements-visibility-button' [class.active]="viewMode == 'caqi'" (click)="toggleView()">
        {{ viewMode === 'sources' ? 'Show CAQI' : 'Show source' }}
      </button>
      <button class='measurements-visibility-button' [class.active]="interpolationViewMode == 'on'" (click)="interpolationView()">
        {{ interpolationViewMode === 'off' ? 'Show interpolation' : 'Turn off interpolation' }}
      </button>
      <div class="prediction-container">
        <h2>Period of prediction</h2>
        <div class="prediction-button-container">
          <button class='prediction-button' [class.active]="predictionViewStatus == 0.5" (click)="predictionView(0.5)">
          30 minutes
          </button>
          <button class='prediction-button' [class.active]="predictionViewStatus == 1" (click)="predictionView(1)">
          1 hour
          </button>
          <button class='prediction-button' [class.active]="predictionViewStatus == 2" (click)="predictionView(2)">
          2 hours
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
